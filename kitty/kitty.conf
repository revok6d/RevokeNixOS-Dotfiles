cursor_shape beam
window_padding_width 12

# Cursor trail — maxed out for a long, glowing, dramatic streak
cursor_trail 1
cursor_trail_decay 0.05 0.5
cursor_trail_start_threshold 0

cursor #00fff9
cursor_text_color background


# BEGIN_KITTY_FONTS
font_family      family='Hack Nerd Font' postscript_name=HackNF-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
scrollbar_width 0
# END_KITTY_FONTS
